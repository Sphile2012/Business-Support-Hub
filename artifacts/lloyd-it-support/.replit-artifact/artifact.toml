kind = "web"
previewPath = "/"
title = "Lloyd IT Support"
version = "1.0.0"
id = "artifacts/lloyd-it-support"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20088

[services.development]
run = "pnpm --filter @workspace/lloyd-it-support run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lloyd-it-support", "run", "build" ]
serve = "static"
publicDir = "artifacts/lloyd-it-support/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20088"
BASE_PATH = "/"
